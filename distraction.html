<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Distraction Recovery</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: rgba(17, 24, 39, 0.95);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(75, 85, 99, 0.5);
      border-radius: 24px;
      padding: 32px;
      width: 80%;
      max-width: 420px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 20px;
    }
    .label {
      color: #9ca3af;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .message {
      color: white;
      font-size: 18px;
      font-weight: 500;
      line-height: 1.5;
    }
    .task-text {
      color: #a78bfa;
      font-size: 16px;
      font-weight: 400;
      font-style: italic;
    }
    .button-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      width: 100%;
    }
    .btn {
      padding: 12px 20px;
      border-radius: 12px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
    }
    .btn:hover { transform: scale(1.02); }
    .btn:active { transform: scale(0.97); }
    .btn-return { background: #059669; }
    .btn-return:hover { background: #10b981; }
    .btn-switch { background: #4b5563; }
    .btn-switch:hover { background: #6b7280; }
    .btn-capture { background: #2563eb; }
    .btn-capture:hover { background: #3b82f6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="label">Distraction Recovery</div>
    <div class="message">No problem. What now?</div>
    <div id="activeTaskDisplay" class="task-text"></div>
    <div class="button-grid">
      <button class="btn btn-return" onclick="respond('return')">Return to task — keep going</button>
      <button class="btn btn-switch" onclick="respond('switch')">Switch to a different task</button>
      <button class="btn btn-capture" onclick="respond('capture')">Capture what distracted me</button>
    </div>
  </div>
  <script>
    async function loadTask() {
      const task = await window.electron.getActiveTask();
      const el = document.getElementById('activeTaskDisplay');
      el.innerText = task && task.text ? '"' + task.text + '"' : '';
    }

    async function respond(action) {
      await window.electron.respondToDistraction(action);
    }

    loadTask();
  </script>
</body>
</html>
