<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Focus Check-in</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .checkin-container {
      background: rgba(17, 24, 39, 0.95);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(75, 85, 99, 0.5);
      border-radius: 24px;
      padding: 32px;
      width: 80%;
      max-width: 400px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 24px;
    }
    .task-text {
      color: white;
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .label {
      color: #9ca3af;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
    }
    .btn {
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
    }
    .btn-yes { background: #059669; }
    .btn-yes:hover { background: #10b981; }
    .btn-distracted { background: #dc2626; }
    .btn-distracted:hover { background: #ef4444; }
    .btn-done { background: #2563eb; }
    .btn-done:hover { background: #3b82f6; }
    .btn-pause { background: #4b5563; }
    .btn-pause:hover { background: #6b7280; }
  </style>
</head>
<body>
  <div class="checkin-container">
    <div class="label">Focus Check-in</div>
    <div id="activeTask" class="task-text">Loading task...</div>
    <div class="button-grid">
      <button class="btn btn-yes" onclick="respond('yes')">Yes, I'm focused</button>
      <button class="btn btn-distracted" onclick="respond('distracted')">No, I got distracted</button>
      <button class="btn btn-done" onclick="respond('done')">Mark as Done</button>
      <button class="btn btn-pause" onclick="respond('pause')">Pause Task</button>
    </div>
  </div>
  <script>
    async function loadTask() {
      const task = await window.electron.getActiveTask();
      document.getElementById('activeTask').innerText = task ? task.text : "No active task";
    }

    async function respond(action) {
      await window.electron.respondToCheckin(action);
      // Window will be hidden by main process
    }

    loadTask();
  </script>
</body>
</html>
