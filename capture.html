<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Quick Capture</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .capture-container {
      background: rgba(17, 24, 39, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(75, 85, 99, 0.5);
      border-radius: 16px;
      padding: 20px;
      width: 80%;
      max-width: 460px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .input-field {
      background: rgba(31, 41, 55, 0.5);
      border: 1px solid rgba(75, 85, 99, 0.5);
      border-radius: 8px;
      padding: 12px 16px;
      color: white;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-field:focus {
      border-color: #3b82f6;
    }
    .hint {
      color: #9ca3af;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="capture-container">
    <input type="text" id="captureInput" class="input-field" placeholder="Capture task... (Enter to save, Esc to cancel)" autofocus>
    <div class="hint">Ctrl + Space to toggle • Enter to add • Esc to close</div>
  </div>
  <script>
    const input = document.getElementById('captureInput');
    
    // Focus input immediately
    input.focus();

    input.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        const text = input.value.trim();
        if (text) {
          await window.electron.addTask({
            id: crypto.randomUUID(),
            text: text,
            type: 'lookup',
            createdAt: Date.now()
          });
        }
        input.value = '';
        input.blur();
      } else if (e.key === 'Escape') {
        window.electron.closeCapture();
      }
    });
  </script>
</body>
</html>
